name: Sommelier
options:
  bundleIdPrefix: com.sommelier
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    PRODUCT_NAME: Sommelier
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  Sommelier:
    type: application
    platform: macOS
    sources:
      - path: Sommelier
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sommelier.app
        INFOPLIST_FILE: Sommelier/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sommelier/Sommelier.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APP_SANDBOX: false
        SWIFT_STRICT_CONCURRENCY: complete

  SommelierTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SommelierTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: Sommelier
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_MODULE_NAME: SommelierTests
        PRODUCT_BUNDLE_IDENTIFIER: com.sommelier.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Sommelier.app/Contents/MacOS/Sommelier"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Sommelier:
    build:
      targets:
        Sommelier: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SommelierTests
  SommelierTests:
    build:
      targets:
        Sommelier: all
        SommelierTests: [test]
    test:
      config: Debug
      targets:
        - SommelierTests
